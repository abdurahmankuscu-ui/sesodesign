<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim — SESO Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f5f5f5;
      --text: #1a1a1a;
      --text-muted: #666666;
      --text-light: #999999;
      --accent: #E5A620;
      --accent-hover: #d4951a;
      --border: #e8e8e8;
      --border-light: #f0f0f0;
      --font: 'Poppins', sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
    ::selection { background: var(--accent); color: #fff; }

    /* NAV */
    nav {
      position: fixed;
      top: 16px;
      left: 24px;
      right: 24px;
      z-index: 1000;
      padding: 0 clamp(24px, 4vw, 48px);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 80px;
    }

    .nav-logo img { height: 101px; width: auto; }
    .nav-links { display: flex; gap: 0; list-style: none; align-items: center; }
    .nav-links a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 10px 24px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color var(--transition), text-shadow var(--transition);
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 24px;
      right: 24px;
      height: 1.5px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--transition);
    }
    .nav-links a:hover { color: var(--accent); text-shadow: 0 0 12px rgba(229, 166, 32, 0.6), 0 0 24px rgba(229, 166, 32, 0.3); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-links a.active { color: var(--accent); text-shadow: 0 0 12px rgba(229, 166, 32, 0.6), 0 0 24px rgba(229, 166, 32, 0.3); }
    .nav-links a.active::after { transform: scaleX(1); }

    .nav-social { display: flex; align-items: center; gap: 8px; margin-left: 12px; padding-left: 20px; border-left: 1px solid rgba(0,0,0,0.15); }
    .nav-social a { padding: 8px !important; display: flex; align-items: center; }
    .nav-social a::after { display: none !important; }

    .mobile-toggle { display: none; background: none; border: none; color: #1a1a1a; cursor: pointer; padding: 8px; }
    .mobile-toggle svg { width: 24px; height: 24px; }

    /* CONTACT PAGE */
    .contact-page {
      min-height: 100vh;
      padding: clamp(140px, 15vw, 200px) clamp(24px, 4vw, 60px) clamp(80px, 10vw, 140px);
    }

    .contact-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .contact-header {
      margin-bottom: 64px;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 20px;
    }
    .section-title strong { font-weight: 700; }

    .contact-desc {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.9;
      max-width: 520px;
      font-weight: 300;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(48px, 6vw, 120px);
      align-items: start;
    }

    /* CONTACT DETAILS */
    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 400;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-light);
      transition: all var(--transition);
    }
    .contact-link:last-child { border-bottom: none; }
    .contact-link:hover { color: var(--accent); padding-left: 8px; }

    .contact-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text);
      transition: all var(--transition);
    }
    .contact-link:hover .contact-link-icon { background: var(--accent); color: #fff; }

    /* FORM */
    .contact-form-wrap {
      background: var(--bg-alt);
      padding: 48px;
      border-radius: 12px;
    }

    .contact-form { display: flex; flex-direction: column; gap: 20px; }

    .form-group label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      transition: border-color 0.3s;
      outline: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--text-light); }

    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }

    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all var(--transition);
      border: none;
    }

    .btn-primary {
      padding: 16px 40px;
      background: var(--text);
      color: #fff;
      border-radius: 8px;
    }
    .btn-primary:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      nav { left: 16px; right: 16px; top: 12px; }
      .contact-page { padding-top: 140px; }
      .contact-grid { gap: clamp(36px, 5vw, 80px); }
    }

    @media (max-width: 768px) {
      nav { left: 12px; right: 12px; top: 8px; padding: 0 16px; border-radius: 12px; }
      .nav-inner { height: 60px; }
      .nav-logo img { height: 50px; }
      .mobile-toggle { display: block; }
      .nav-links {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: -12px; right: -12px;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 0;
        gap: 0;
      }
      .nav-links.show { display: flex; }
      .nav-links a { padding: 14px 24px; font-size: 0.82rem; text-align: left; color: #1a1a1a; }
      .nav-links a::after { display: none; }
      .nav-social {
        border-left: none;
        padding-left: 24px;
        margin-left: 0;
        padding-top: 8px;
        padding-bottom: 8px;
        border-top: 1px solid var(--border-light);
      }

      .contact-page { padding: 100px 20px 60px; }
      .contact-header { margin-bottom: 40px; }
      .section-title { font-size: clamp(1.5rem, 5vw, 2.2rem); }
      .contact-desc { font-size: 0.9rem; }
      .contact-grid { grid-template-columns: 1fr; gap: 32px; }
      .contact-form-wrap { padding: 24px 20px; }
      .form-row { grid-template-columns: 1fr; }
      .contact-link { font-size: 0.85rem; padding: 12px 0; }
      .contact-link-icon { width: 38px; height: 38px; }
    }

    @media (max-width: 480px) {
      nav { left: 8px; right: 8px; top: 6px; padding: 0 12px; }
      .nav-inner { height: 52px; }
      .nav-logo img { height: 42px; }
      .contact-page { padding: 80px 16px 48px; }
      .section-title { font-size: 1.3rem; }
      .section-label { font-size: 0.68rem; }
      .contact-desc { font-size: 0.82rem; }
      .contact-form-wrap { padding: 20px 16px; }
      .form-group label { font-size: 0.62rem; }
      .form-group input, .form-group textarea { font-size: 0.85rem; }
      .contact-link { font-size: 0.8rem; gap: 12px; }
      .contact-link-icon { width: 34px; height: 34px; }
      .btn-primary { padding: 14px 32px; font-size: 0.72rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><img src="assets/logo-sm.png" alt="SESO Design" /></a>
      <ul class="nav-links">
        <li><a href="index.html#works">Projeler</a></li>
        <li><a href="index.html#about">Hakkımda</a></li>
        <li><a href="contact.html" class="active">İletişim</a></li>
        <li class="nav-social">
          <a href="https://www.instagram.com/sesodesignstudio" target="_blank" aria-label="Instagram">

          </a>
          <a href="https://www.linkedin.com/in/selami-soylu-a6644111a" target="_blank" aria-label="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>

      </button>
    </div>
  </nav>

  <!-- CONTACT -->
  <div class="contact-page">
    <div class="contact-container">
      <div class="contact-header" data-aos="fade-up">
        <div class="section-label">İletişim</div>
        <h1 class="section-title">Kalıcı bir şey <strong>inşa edelim</strong></h1>
        <p class="contact-desc">İyi tasarım bir sohbetle başlar. Bir sonraki projenizi konuşmak için bize ulaşın.</p>
      </div>

      <div class="contact-grid">
        <div class="contact-details" data-aos="fade-up" data-aos-delay="100">
          <a href="mailto:sesodesignstudio@gmail.com" class="contact-link">

            </div>

  </div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js"></script>
  <script>
    const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smoothWheel: true });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

    AOS.init({ duration: 800, easing: 'ease-out-cubic', once: true, offset: 60 });

    document.getElementById('formRedirect').value = window.location.href;
  </script>
